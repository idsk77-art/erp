<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RuahNote</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Google Login Screen -->
    <div id="loginScreen" class="login-overlay">
      <div class="login-card">
        <h2>RuahNote</h2>
        <p class="muted">일정, 할 일, 연락처, 문서를 한곳에서 관리하세요.</p>
        <button id="googleLoginBtn" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" style="vertical-align: middle;">
            <path fill="#EA4335" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.6-2.6C13.51.7 11.49 0 9 0 5.48 0 2.44 2.02.96 4.96l3.05 2.37C4.72 5.18 6.66 3.48 9 3.48z"/>
            <path fill="#4285F4" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.47h4.84c-.1.58-.47 1.44-1.28 2.01l2.97 2.3c1.73-1.6 2.73-3.95 2.73-6.77L17.64 9.2z"/>
            <path fill="#FBBC05" d="M4.01 10.72c-.22-.66-.35-1.37-.35-2.09s.13-1.43.35-2.09L.96 6.17C.32 7.42 0 8.84 0 10.3c0 1.46.32 2.88.96 4.13l3.05-2.37z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.97-2.3c-.83.56-1.89.9-2.99.9-2.34 0-4.28-1.7-4.99-3.85L.96 12.94C2.44 15.88 5.48 18 9 18z"/>
          </svg>
          Google 계정으로 로그인
        </button>
      </div>
    </div>

    <main id="appScreen" class="shell" style="display: none;">
      <header class="topbar">
        <div>
          <h1>RuahNote</h1>
          <p>일정, 할 일, 연락처, 문서, 녹취 보고서를 한곳에서 관리합니다.</p>
        </div>
        <div id="userProfileArea" class="user-profile-chip" style="display: none;">
          <img id="userPicture" src="" alt="Profile" />
          <span id="userName">User Name</span>
          <button id="logoutBtn" class="ghost-button" style="min-height: 26px; border-radius: 12px; font-size: 11px;">로그아웃</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <h2>할 일</h2>
            <button id="addTodo">추가</button>
          </div>
          <input id="todoTitle" placeholder="할 일 제목" />
          <ul id="todoList" class="list"></ul>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>일정</h2>
            <button id="addEvent">추가</button>
          </div>
          <input id="eventTitle" placeholder="일정 제목" />
          <ul id="eventList" class="list"></ul>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>연락처</h2>
            <button id="addContact">추가</button>
          </div>
          <input id="contactName" placeholder="이름" />
          <input id="contactEmail" placeholder="이메일" />
          <hr class="upload-divider" />
          <div class="panel-header" style="margin-top: 4px;">
            <span class="muted" style="font-size: 13px;">명함 OCR 등록</span>
            <button id="uploadCard" class="ghost-button" style="min-height: 30px;">스캔</button>
          </div>
          <input id="cardFile" type="file" accept="image/*" />
          <ul id="contactList" class="list"></ul>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>문서 스캔</h2>
            <button id="uploadDocument">업로드</button>
          </div>
          <input id="documentFile" type="file" />
          <ul id="documentList" class="list"></ul>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>녹취 보고서</h2>
            <button id="uploadAudio">업로드</button>
          </div>
          <input id="audioFile" type="file" accept="audio/*" />
          <ul id="reportList" class="list"></ul>
        </article>
      </section>
    </main>
    <!-- OCR Review Modal -->
    <div id="ocrModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3>명함 OCR 결과 검토</h3>
          <button id="closeOcrModal" class="ghost-button" style="min-height: 28px;">닫기</button>
        </div>
        <div class="form-group">
          <label for="ocrName">이름</label>
          <input id="ocrName" />
        </div>
        <div class="form-group">
          <label for="ocrCompany">회사명</label>
          <input id="ocrCompany" />
        </div>
        <div class="form-group">
          <label for="ocrJobTitle">직책</label>
          <input id="ocrJobTitle" />
        </div>
        <div class="form-group">
          <label for="ocrPhone">전화번호</label>
          <input id="ocrPhone" />
        </div>
        <div class="form-group">
          <label for="ocrEmail">이메일</label>
          <input id="ocrEmail" />
        </div>
        <div class="form-group">
          <label>추출 텍스트 원본</label>
          <div id="ocrRawText" class="raw-text-preview"></div>
        </div>
        <div class="modal-footer">
          <button id="saveOcrContact">연락처로 저장</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
